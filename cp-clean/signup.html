<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Clear Philanthropy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'><rect width='44' height='44' rx='10' fill='%231A6EB5'/><circle cx='17' cy='22' r='10' stroke='white' stroke-width='1.8' fill='rgba(255,255,255,0.1)'/><circle cx='27' cy='22' r='10' stroke='rgba(255,255,255,0.5)' stroke-width='1.8' fill='rgba(255,255,255,0.05)'/><path d='M22 13.2C19 16 19 28 22 30.8C25 28 25 16 22 13.2Z' fill='white'/></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    background: #F3F6FA;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .login-wrap { width: 100%; max-width: 420px; }
  .login-logo {
    display: flex; align-items: center; gap: 10px;
    justify-content: center; margin-bottom: 2rem;
  }
  .logo-mark {
    width: 36px; height: 36px; background: #1A6EB5;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 18px; height: 18px; }
  .logo-text { font-size: 18px; font-weight: 800; color: #0B2545; letter-spacing: -0.02em; }
  .logo-text span { color: #1A6EB5; }
  .login-card {
    background: #fff; border: 1px solid #E5E7EB;
    border-radius: 14px; padding: 2.5rem;
    box-shadow: 0 4px 24px rgba(11,37,69,0.08);
  }
  .login-title { font-size: 20px; font-weight: 800; color: #0B2545; margin-bottom: 6px; text-align: center; }
  .login-sub { font-size: 13px; color: #6B7280; text-align: center; margin-bottom: 2rem; }
  .field-wrap { margin-bottom: 1rem; }
  .field-wrap label { font-size: 12px; font-weight: 600; color: #6B7280; display: block; margin-bottom: 5px; }
  .field-wrap input {
    width: 100%; padding: 10px 12px; border: 1px solid #E5E7EB;
    border-radius: 8px; font-size: 14px; font-family: inherit;
    color: #111827; background: #fff; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field-wrap input:focus { outline: none; border-color: #1A6EB5; box-shadow: 0 0 0 3px rgba(26,110,181,0.1); }
  .btn-signup {
    width: 100%; background: #1A6EB5; color: #fff; border: none;
    border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 700;
    font-family: inherit; cursor: pointer; transition: background 0.15s; margin-top: 0.5rem;
  }
  .btn-signup:hover { background: #155fa0; }
  .btn-signup:disabled { background: #93C5FD; cursor: not-allowed; }
  .error-msg { background: #FEE2E2; color: #991B1B; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 1rem; display: none; font-weight: 500; }
  .success-msg { background: #E8F5F0; color: #0F6E56; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 1rem; display: none; font-weight: 500; }
  .login-footer { text-align: center; margin-top: 1.5rem; font-size: 12px; color: #9CA3AF; }
  .login-footer a { color: #1A6EB5; text-decoration: none; font-weight: 600; }
  .login-footer a:hover { text-decoration: underline; }
  .divider { border: none; border-top: 1px solid #E5E7EB; margin: 1.25rem 0; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 28 26" fill="none" width="16" height="15"><circle cx="10" cy="13" r="9" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.15)"/><circle cx="18" cy="13" r="9" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="rgba(255,255,255,0.05)"/><path d="M14 5.2C11.2 7.8 11.2 18.2 14 20.8C16.8 18.2 16.8 7.8 14 5.2Z" fill="white"/></svg>
    </div>
    <div class="logo-text">Clear <span>Philanthropy</span></div>
  </div>

  <div class="login-card">
    <div class="login-title">Create your account</div>
    <div class="login-sub">Beta access to Clear Philanthropy</div>

    <div class="field-wrap">
      <label>Full Name</label>
      <input type="text" id="nameInput" placeholder="Jane Smith" autocomplete="name">
    </div>
    <div class="field-wrap">
      <label>Email Address</label>
      <input type="email" id="emailInput" placeholder="you@foundation.org" autocomplete="email">
    </div>
    <div class="field-wrap">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="At least 8 characters" autocomplete="new-password">
    </div>
    <div class="field-wrap">
      <label>Confirm Password</label>
      <input type="password" id="confirmInput" placeholder="Repeat your password" autocomplete="new-password">
    </div>

    <button class="btn-signup" id="signupBtn" onclick="signUp()">Create Account</button>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <hr class="divider">
    <div style="text-align:center;font-size:13px;color:#6B7280">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <div class="login-footer">
    Clear Philanthropy · Financial clarity for every grant decision
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  // If already logged in, go straight to dashboard
  document.addEventListener('DOMContentLoaded', async () => {
    const session = await AUTH.getSession();
    if (session) window.location.href = 'index.html';
  });

  async function signUp() {
    const name     = document.getElementById('nameInput').value.trim();
    const email    = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const confirm  = document.getElementById('confirmInput').value;
    const btn      = document.getElementById('signupBtn');
    const errorEl  = document.getElementById('errorMsg');
    const successEl= document.getElementById('successMsg');

    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    if (!name) { showError('Please enter your full name.'); return; }
    if (!email) { showError('Please enter your email address.'); return; }
    if (!password || password.length < 8) { showError('Password must be at least 8 characters.'); return; }
    if (password !== confirm) { showError('Passwords do not match.'); return; }

    btn.textContent = 'Creating account...';
    btn.disabled = true;

    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          email,
          password,
          data: { full_name: name }
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error_description || data.msg || 'Sign up failed.');
      }

      // If email confirmation is required
      if (!data.access_token) {
        successEl.textContent = '✓ Account created! Check your email to confirm your address, then sign in.';
        successEl.style.display = 'block';
        btn.textContent = 'Create Account';
        btn.disabled = false;
        return;
      }

      // Auto login if no email confirmation needed
      localStorage.setItem('cp_session', JSON.stringify({
        access_token: data.access_token,
        refresh_token: data.refresh_token,
        expires_at: Date.now() + (data.expires_in * 1000),
        user: data.user
      }));

      successEl.textContent = '✓ Account created! Redirecting...';
      successEl.style.display = 'block';
      setTimeout(() => window.location.href = 'index.html', 1200);

    } catch(e) {
      showError(e.message);
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') signUp();
  });
</script>
</body>
</html>
