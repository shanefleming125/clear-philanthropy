<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Clear Philanthropy</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'><rect width='44' height='44' rx='10' fill='%231A6EB5'/><circle cx='17' cy='22' r='10' stroke='white' stroke-width='1.8' fill='rgba(255,255,255,0.1)'/><circle cx='27' cy='22' r='10' stroke='rgba(255,255,255,0.5)' stroke-width='1.8' fill='rgba(255,255,255,0.05)'/><path d='M22 13.2C19 16 19 28 22 30.8C25 28 25 16 22 13.2Z' fill='white'/></svg>">
<style>
  .admin-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; }
  .user-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #F3F4F6; font-size: 13px; }
  .user-row:last-child { border-bottom: none; }
  .user-email { font-weight: 600; color: var(--text); }
  .user-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .user-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
  .badge-confirmed { background: #dcfce7; color: #166534; }
  .badge-pending { background: #fef3c7; color: #92400e; }
  .badge-admin { background: #E6F1FB; color: #0C447C; }
  .invite-row { display: flex; gap: 10px; align-items: flex-end; }
  .invite-row .field-wrap { flex: 1; margin: 0; }
  .btn-danger { background: none; border: 1px solid #FCA5A5; color: var(--red); border-radius: var(--radius-sm); padding: 4px 10px; font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn-danger:hover { background: #FEE2E2; }
  .success-msg { font-size: 13px; color: var(--green); font-weight: 700; display: none; }
  .users-loading { font-size: 13px; color: var(--text-secondary); padding: 1rem 0; }
</style>
</head>
<body style="display:none">
<nav class="topbar">
  <a href="marketing.html" class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 28 26" fill="none" width="16" height="15"><circle cx="10" cy="13" r="9" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.15)"/><circle cx="18" cy="13" r="9" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="rgba(255,255,255,0.05)"/><path d="M14 5.2C11.2 7.8 11.2 18.2 14 20.8C16.8 18.2 16.8 7.8 14 5.2Z" fill="white"/></svg>
    </div>
    <div class="logo-text">Clear <span>Philanthropy</span></div>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="admin.html" class="nav-link active">Admin</a>
    <span id="userEmail" class="nav-user-email"></span>
    <button class="btn-intake" onclick="AUTH.signOut()">Sign Out</button>
  </div>
</nav>

<main class="container" style="max-width:700px">
  <div class="page-header">
    <div>
      <h1>User Management</h1>
      <p class="page-sub">Invite reviewers and manage access to Clear Philanthropy</p>
    </div>
  </div>

  <!-- Invite -->
  <div class="admin-card">
    <div class="sec-title">Invite A New User</div>
    <div class="invite-row">
      <div class="field-wrap">
        <label>Email Address</label>
        <input type="email" id="inviteEmail" placeholder="colleague@foundation.org">
      </div>
      <button class="btn-primary" onclick="inviteUser()" id="inviteBtn">Send Invite</button>
    </div>
    <div style="margin-top:10px">
      <span class="success-msg" id="inviteSuccess">✓ Invite sent!</span>
      <span class="error-msg" id="inviteError" style="display:none"></span>
    </div>
    <p style="font-size:12px;color:var(--text-secondary);margin-top:10px">
      The user will receive an email with a link to set their password and access the dashboard.
    </p>
  </div>

  <!-- Users list -->
  <div class="admin-card">
    <div class="sec-title">Current Users</div>
    <div id="usersLoading" class="users-loading">Loading users...</div>
    <div id="usersList"></div>
  </div>
</main>

<script src="js/auth.js"></script>
<script>
  // Auth guard
  (async () => {
    const session = await AUTH.requireAuth();
    if (!session) return;
    document.body.style.display = '';
    if (session.user?.email) {
      document.getElementById('userEmail').textContent = session.user.email;
    }
    loadUsers();
  })();

  async function inviteUser() {
    const email = document.getElementById('inviteEmail').value.trim();
    const btn = document.getElementById('inviteBtn');
    const successEl = document.getElementById('inviteSuccess');
    const errorEl = document.getElementById('inviteError');

    if (!email) {
      errorEl.textContent = 'Please enter an email address.';
      errorEl.style.display = 'inline';
      return;
    }

    btn.textContent = 'Sending...';
    btn.disabled = true;
    successEl.style.display = 'none';
    errorEl.style.display = 'none';

    try {
      const res = await fetch('https://calm-forest-dfc5.shanefleming125.workers.dev/invite', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to send invite.');

      document.getElementById('inviteEmail').value = '';
      successEl.style.display = 'inline';
      setTimeout(() => successEl.style.display = 'none', 3000);
      loadUsers();
    } catch(e) {
      errorEl.textContent = e.message;
      errorEl.style.display = 'inline';
    }

    btn.textContent = 'Send Invite';
    btn.disabled = false;
  }

  async function loadUsers() {
    const loadingEl = document.getElementById('usersLoading');
    const listEl = document.getElementById('usersList');

    try {
      const res = await fetch('https://calm-forest-dfc5.shanefleming125.workers.dev/users');
      if (!res.ok) throw new Error('Could not load users.');
      const data = await res.json();
      const users = data.users || [];

      loadingEl.style.display = 'none';

      if (!users.length) {
        listEl.innerHTML = '<div class="users-loading">No users yet.</div>';
        return;
      }

      const currentUser = (await AUTH.getUser())?.id;

      listEl.innerHTML = users.map(u => {
        const isYou = u.id === currentUser;
        const confirmed = !!u.email_confirmed_at;
        const lastSign = u.last_sign_in_at ? new Date(u.last_sign_in_at).toLocaleDateString() : 'Never';
        const created = new Date(u.created_at).toLocaleDateString();

        return `
          <div class="user-row">
            <div>
              <div class="user-email">${u.email} ${isYou ? '<span class="user-badge badge-admin">You</span>' : ''}</div>
              <div class="user-meta">Invited: ${created}  ·  Last login: ${lastSign}</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <span class="user-badge ${confirmed ? 'badge-confirmed' : 'badge-pending'}">
                ${confirmed ? 'Active' : 'Pending'}
              </span>
              ${!isYou ? `<button class="btn-danger" onclick="revokeUser('${u.id}', '${u.email}', this)">Revoke</button>` : ''}
            </div>
          </div>`;
      }).join('');

    } catch(e) {
      loadingEl.textContent = 'Unable to load users. Admin API access may be required.';
    }
  }

  async function revokeUser(id, email, btn) {
    if (!confirm(`Revoke access for ${email}? They will no longer be able to log in.`)) return;
    btn.textContent = 'Revoking...';
    btn.disabled = true;

    try {
      const res = await fetch(`https://calm-forest-dfc5.shanefleming125.workers.dev/users/${id}`, {
        method: 'DELETE'
      });
      if (!res.ok) throw new Error('Failed to revoke access.');
      btn.closest('.user-row').remove();
    } catch(e) {
      alert('Error: ' + e.message);
      btn.textContent = 'Revoke';
      btn.disabled = false;
    }
  }

  // Enter key on invite field
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('inviteEmail')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') inviteUser();
    });
  });
</script>
</body>
</html>
