<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Clear Philanthropy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'><rect width='44' height='44' rx='10' fill='%231A6EB5'/><circle cx='17' cy='22' r='10' stroke='white' stroke-width='1.8' fill='rgba(255,255,255,0.1)'/><circle cx='27' cy='22' r='10' stroke='rgba(255,255,255,0.5)' stroke-width='1.8' fill='rgba(255,255,255,0.05)'/><path d='M22 13.2C19 16 19 28 22 30.8C25 28 25 16 22 13.2Z' fill='white'/></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    background: #F3F6FA;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .login-wrap {
    width: 100%;
    max-width: 420px;
  }
  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin-bottom: 2rem;
    text-decoration: none;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: #1A6EB5;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 18px; height: 18px; }
  .logo-text { font-size: 18px; font-weight: 800; color: #0B2545; letter-spacing: -0.02em; }
  .logo-text span { color: #1A6EB5; }
  .login-card {
    background: #fff;
    border: 1px solid #E5E7EB;
    border-radius: 14px;
    padding: 2.5rem;
    box-shadow: 0 4px 24px rgba(11,37,69,0.08);
  }
  .login-title {
    font-size: 20px;
    font-weight: 800;
    color: #0B2545;
    margin-bottom: 6px;
    text-align: center;
  }
  .login-sub {
    font-size: 13px;
    color: #6B7280;
    text-align: center;
    margin-bottom: 2rem;
  }
  .field-wrap { margin-bottom: 1rem; }
  .field-wrap label {
    font-size: 12px;
    font-weight: 600;
    color: #6B7280;
    display: block;
    margin-bottom: 5px;
  }
  .field-wrap input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #E5E7EB;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    color: #111827;
    background: #fff;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field-wrap input:focus {
    outline: none;
    border-color: #1A6EB5;
    box-shadow: 0 0 0 3px rgba(26,110,181,0.1);
  }
  .btn-signin {
    width: 100%;
    background: #1A6EB5;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 0.5rem;
  }
  .btn-signin:hover { background: #155fa0; }
  .btn-signin:disabled { background: #93C5FD; cursor: not-allowed; }
  .error-msg {
    background: #FEE2E2;
    color: #991B1B;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-top: 1rem;
    display: none;
    font-weight: 500;
  }
  .success-msg {
    background: #E8F5F0;
    color: #0F6E56;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-top: 1rem;
    display: none;
    font-weight: 500;
  }
  .login-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 12px;
    color: #9CA3AF;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <a href="https://clearphilanthropy.com" style="text-decoration:none;"><div class="login-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 28 26" fill="none" width="16" height="15"><circle cx="10" cy="13" r="9" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.15)"/><circle cx="18" cy="13" r="9" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="rgba(255,255,255,0.05)"/><path d="M14 5.2C11.2 7.8 11.2 18.2 14 20.8C16.8 18.2 16.8 7.8 14 5.2Z" fill="white"/></svg>
    </div>
    <div class="logo-text">Clear <span>Philanthropy</span></div>
  </div></a>

  <div class="login-card">
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to your Clear Philanthropy account</div>

    <div class="field-wrap">
      <label>Email Address</label>
      <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field-wrap">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-signin" id="signinBtn" onclick="signIn()">Sign In</button>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
    <hr style="border:none;border-top:1px solid #E5E7EB;margin:1.25rem 0">
    <div style="text-align:center;font-size:13px;color:#6B7280">
      Need access? <a href="signup.html" style="color:#1A6EB5;text-decoration:none;font-weight:600">Create an account</a>
    </div>
  </div>

  <div class="login-footer">
    Clear Philanthropy · Financial clarity for every grant decision
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  // If already logged in, go straight to dashboard
  document.addEventListener('DOMContentLoaded', async () => {
    const session = await AUTH.getSession();
    if (session) window.location.href = 'index.html';
  });

  async function signIn() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const btn = document.getElementById('signinBtn');
    const errorEl = document.getElementById('errorMsg');
    const successEl = document.getElementById('successMsg');

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    btn.textContent = 'Signing in...';
    btn.disabled = true;
    errorEl.style.display = 'none';

    const result = await AUTH.signIn(email, password);
    if (result.error) {
      showError(result.error);
      btn.textContent = 'Sign In';
      btn.disabled = false;
    } else {
      window.location.href = 'index.html';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') signIn();
  });
</script>
</body>
</html>
