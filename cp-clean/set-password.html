<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Password — Clear Philanthropy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'><rect width='44' height='44' rx='10' fill='%231A6EB5'/><circle cx='17' cy='22' r='10' stroke='white' stroke-width='1.8' fill='rgba(255,255,255,0.1)'/><circle cx='27' cy='22' r='10' stroke='rgba(255,255,255,0.5)' stroke-width='1.8' fill='rgba(255,255,255,0.05)'/><path d='M22 13.2C19 16 19 28 22 30.8C25 28 25 16 22 13.2Z' fill='white'/></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    background: #F3F6FA;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .wrap { width: 100%; max-width: 440px; }
  .logo {
    display: flex; align-items: center; gap: 10px;
    justify-content: center; margin-bottom: 2rem;
  }
  .logo-mark {
    width: 36px; height: 36px; background: #1A6EB5;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 18px; height: 18px; }
  .logo-text { font-size: 18px; font-weight: 800; color: #0B2545; }
  .logo-text span { color: #1A6EB5; }
  .card {
    background: #fff; border: 1px solid #E5E7EB;
    border-radius: 14px; padding: 2.5rem;
    box-shadow: 0 4px 24px rgba(11,37,69,0.08);
  }
  .card-title { font-size: 20px; font-weight: 800; color: #0B2545; margin-bottom: 6px; text-align: center; }
  .card-sub { font-size: 13px; color: #6B7280; text-align: center; margin-bottom: 1.75rem; }
  .field { margin-bottom: 1rem; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field label { font-size: 12px; font-weight: 600; color: #6B7280; display: block; margin-bottom: 5px; }
  .field input {
    width: 100%; padding: 10px 12px; border: 1px solid #E5E7EB;
    border-radius: 8px; font-size: 14px; font-family: inherit;
    color: #111827; background: #fff; transition: border-color 0.15s;
  }
  .field input:focus { outline: none; border-color: #1A6EB5; box-shadow: 0 0 0 3px rgba(26,110,181,0.1); }
  .section-divider {
    border-top: 1px solid #E5E7EB;
    margin: 1.5rem 0 1.25rem;
    position: relative;
  }
  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: #9CA3AF; margin-bottom: 1rem;
  }
  .btn {
    width: 100%; background: #1A6EB5; color: #fff; border: none;
    border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 700;
    font-family: inherit; cursor: pointer; transition: background 0.15s; margin-top: 0.5rem;
  }
  .btn:hover { background: #155fa0; }
  .btn:disabled { background: #93C5FD; cursor: not-allowed; }
  .error-msg { background: #FEE2E2; color: #991B1B; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 1rem; display: none; font-weight: 500; }
  .success-msg { background: #E8F5F0; color: #0F6E56; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 1rem; display: none; font-weight: 500; }
  .footer { text-align: center; margin-top: 1.5rem; font-size: 12px; color: #9CA3AF; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 28 26" fill="none" width="16" height="15"><circle cx="10" cy="13" r="9" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.15)"/><circle cx="18" cy="13" r="9" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="rgba(255,255,255,0.05)"/><path d="M14 5.2C11.2 7.8 11.2 18.2 14 20.8C16.8 18.2 16.8 7.8 14 5.2Z" fill="white"/></svg>
    </div>
    <div class="logo-text">Clear <span>Philanthropy</span></div>
  </div>

  <div class="card" id="setPasswordCard">
    <div class="card-title">Welcome to Clear Philanthropy</div>
    <div class="card-sub">Let's finish setting up your account.</div>

    <div class="section-label">Your Information</div>
    <div class="field field-row">
      <div>
        <label>First Name</label>
        <input type="text" id="firstName" placeholder="Jane" autocomplete="given-name">
      </div>
      <div>
        <label>Last Name</label>
        <input type="text" id="lastName" placeholder="Smith" autocomplete="family-name">
      </div>
    </div>
    <div class="field">
      <label>Organization</label>
      <input type="text" id="organization" placeholder="Smith Family Foundation" autocomplete="organization">
    </div>
    <div class="field">
      <label>Role</label>
      <input type="text" id="role" placeholder="Program Officer">
    </div>

    <div class="section-divider"></div>

    <div class="section-label">Set Your Password</div>
    <div class="field">
      <label>New Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat your password" autocomplete="new-password">
    </div>

    <button class="btn" id="setBtn" onclick="setPassword()">Complete Setup & Sign In</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
  </div>

  <div class="footer">Clear Philanthropy · Financial clarity for every grant decision</div>
</div>

<script>
  const SUPABASE_URL  = 'https://raqlumqmxlhecmgntvlt.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhcWx1bXFteGxoZWNtZ250dmx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MzE3MDksImV4cCI6MjA5NjAwNzcwOX0.oViokaRl4CWMoOI6BrC8wCW4rq5AI_rjUhtwU_xsumc';

  // Extract token from URL hash or query params
  function getTokens() {
    // Supabase puts tokens in the hash fragment: #access_token=...&type=invite
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const type = params.get('type');
    return { accessToken, refreshToken, type };
  }

  async function setPassword() {
    const firstName = document.getElementById('firstName').value.trim();
    const lastName  = document.getElementById('lastName').value.trim();
    const organization = document.getElementById('organization').value.trim();
    const role = document.getElementById('role').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirmPassword').value;
    const btn      = document.getElementById('setBtn');
    const errorEl  = document.getElementById('errorMsg');
    const successEl= document.getElementById('successMsg');

    errorEl.style.display = 'none';

    if (!firstName || !lastName) {
      errorEl.textContent = 'Please enter your first and last name.';
      errorEl.style.display = 'block';
      return;
    }
    if (!organization) {
      errorEl.textContent = 'Please enter your organization.';
      errorEl.style.display = 'block';
      return;
    }
    if (!password || password.length < 8) {
      errorEl.textContent = 'Password must be at least 8 characters.';
      errorEl.style.display = 'block';
      return;
    }
    if (password !== confirm) {
      errorEl.textContent = 'Passwords do not match.';
      errorEl.style.display = 'block';
      return;
    }

    btn.textContent = 'Setting up your account...';
    btn.disabled = true;

    const { accessToken } = getTokens();

    if (!accessToken) {
      errorEl.textContent = 'Invalid or expired invite link. Please ask to be re-invited.';
      errorEl.style.display = 'block';
      btn.textContent = 'Complete Setup & Sign In';
      btn.disabled = false;
      return;
    }

    try {
      // Update password AND user_metadata using the access token from the invite link
      const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        method: 'PUT',
        headers: {
          'apikey': SUPABASE_ANON,
          'Authorization': `Bearer ${accessToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          password,
          data: {
            first_name: firstName,
            last_name: lastName,
            full_name: `${firstName} ${lastName}`,
            organization,
            role
          }
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error_description || data.msg || 'Failed to set up account.');
      }

      // Save session so they're logged in
      const { refreshToken } = getTokens();
      localStorage.setItem('cp_session', JSON.stringify({
        access_token: accessToken,
        refresh_token: refreshToken,
        expires_at: Date.now() + (3600 * 1000),
        user: data
      }));

      successEl.textContent = '✓ All set! Redirecting to dashboard...';
      successEl.style.display = 'block';

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);

    } catch(e) {
      errorEl.textContent = e.message;
      errorEl.style.display = 'block';
      btn.textContent = 'Complete Setup & Sign In';
      btn.disabled = false;
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') setPassword();
  });

  // Check if we have a valid token on load
  window.addEventListener('DOMContentLoaded', () => {
    const { accessToken, type } = getTokens();
    if (!accessToken) {
      document.getElementById('errorMsg').textContent = 'Invalid or expired invite link. Please ask to be re-invited.';
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('setBtn').disabled = true;
    }
  });
</script>
</body>
</html>
